name: ClaudeUsageBar
options:
  bundleIdPrefix: com.sam
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "26.3"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
targets:
  ClaudeUsageBar:
    type: application
    platform: macOS
    sources:
      - ClaudeUsageBar
    settings:
      base:
        INFOPLIST_FILE: ClaudeUsageBar/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClaudeUsageBar/ClaudeUsageBar.entitlements
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_BUNDLE_IDENTIFIER: com.sam.ClaudeUsageBar
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
